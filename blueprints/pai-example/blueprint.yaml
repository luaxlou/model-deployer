name: pai-example
provider: pai

build:
  context: .
  dockerfile: Dockerfile
  weights:
    - https://huggingface.co/hf-internal-testing/tiny-random-BertModel/resolve/main/config.json

deploy:
  default: pai
  providers:
    - name: local
      health_path: /healthz
      health_port: 18080
    - name: pai
      region: cn-hangzhou
      workspace_id: "your-workspace-id"
      service_name: pai-example
      endpoint: https://your-pai-endpoint.example.com
      image: registry-vpc.cn-hangzhou.aliyuncs.com/your-public-namespace/pai-example
      eas_config: eas-service.json

verify:
  timeout_sec: 120
  interval_sec: 5
  script: ""
