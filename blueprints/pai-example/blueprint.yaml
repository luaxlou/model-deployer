name: pai-example
provider: pai

build:
  context: .
  dockerfile: Dockerfile
  requirements: requirements.txt
  service: service.py
  model:
    code: model/model.py
    weights:
      - name: model-weights
        url: https://huggingface.co/hf-internal-testing/tiny-random-BertModel/resolve/main/config.json

deploy:
  default: pai
  providers:
    - name: local
      health_path: /healthz
      health_port: 18080
      start_command: uvicorn service:app --host 0.0.0.0 --port 18080
    - name: pai
      region: cn-hangzhou
      workspace_id: "your-workspace-id"
      service_name: pai-example
      endpoint: https://your-pai-endpoint.example.com
      push_image_repo: registry-vpc.cn-hangzhou.aliyuncs.com/your-public-namespace/pai-example
      service_config: pai-service.json

verify:
  timeout_sec: 120
  interval_sec: 5
  script: ""
