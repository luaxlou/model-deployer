name: example-model
provider: eas

build:
  dockerfile: Dockerfile
  requirements: requirements.txt
  service: service.py
  context: .

model:
  code: model/model.py
  weights:
    - name: model-weights
      url: https://huggingface.co/hf-internal-testing/tiny-random-BertModel/resolve/main/config.json

deploy:
  health_path: /healthz
  health_port: 8080
  start_command: python service.py

verify:
  timeout_sec: 60
  interval_sec: 2
