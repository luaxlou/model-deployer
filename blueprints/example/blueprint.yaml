name: example-model
provider: local

build:
  dockerfile: Dockerfile
  requirements: requirements.txt
  service: service.py
  context: .
  model:
    code: model/model.py
    weights:
      - name: model-weights
        url: https://huggingface.co/hf-internal-testing/tiny-random-BertModel/resolve/main/config.json

deploy:
  default: local
  providers:
    - name: local
      health_path: /healthz
      health_port: 18080
      start_command: uvicorn service:app --host 0.0.0.0 --port 18080

verify:
  timeout_sec: 60
  interval_sec: 2
  script: smoke.sh
