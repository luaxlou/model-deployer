name: example-model
provider: local

build:
  dockerfile: Dockerfile
  context: .
  model:
    weights:
      - name: model-weights
        url: https://raw.githubusercontent.com/luaxlou/model-deployer/main/blueprints/example/model/tiny_model.joblib

deploy:
  default: local
  providers:
    - name: local
      health_path: /healthz
      health_port: 18080

verify:
  timeout_sec: 60
  interval_sec: 2
  script: smoke.sh
