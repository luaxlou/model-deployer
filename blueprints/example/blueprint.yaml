name: example-model
provider: eas

build:
  dockerfile: Dockerfile
  requirements: requirements.txt
  service: service.py
  context: .

model:
  code: model/model.py
  weights:
    - name: model-weights
      url: https://example.com/model.bin

deploy:
  health_path: /healthz
  health_port: 8080
  start_command: python service.py

verify:
  timeout_sec: 5
  interval_sec: 1
